[build]
  command = "vite build"
  publish = "dist"

[[headers]]
for = "/index.html"
  [headers.values]
  Cache-Control = "no-store"

[[headers]]
for = "/sw.js"
  [headers.values]
  Cache-Control = "no-store"

[[headers]]
for = "/assets/*"
  [headers.values]
  Cache-Control = "public, max-age=31536000, immutable"
